<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Directory Setup</title>
  <link rel="stylesheet" href="assets/style.css" />
    <style>
    /* ===== BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
    }

    body.directory-body {
      background: #f6f7fb;
      color: #2f2f2f;
      min-height: 100vh;
    }

    /* ===== PAGE STRUCTURE ===== */


    .page-card {
      background: #f6f7fb;
      padding: 40px 50px;
      transition: all 0.3s ease;
    }


    /* ===== HEADER ===== */
    .page-header {
      text-align: left;
      margin-bottom: 35px;
    }

    .page-title {
      font-size: 1.9rem;
      font-weight: 700;
      color: #1f3b73;
      letter-spacing: -0.5px;
    }

    .page-subtitle {
      color: #6b7280;
      font-size: 1rem;
      margin-top: 8px;
    }

    /* ===== TABS ===== */
    .directory-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      border-bottom: 2px solid #f0f0f0;
      margin-bottom: 25px;
    }

    .directory-options button {
      background: #ffffff;
      border: 1px solid #d4d9e2;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: 500;
      color: #4b5563;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .directory-options button:hover {
      background: #f3f6fb;
    }

    .directory-options button.active,
    .directory-options button:focus {
      background: #ffffff;
      border-bottom: 2px solid #1f3b73;
      color: #1f3b73;
      font-weight: 600;
    }

    /* ===== SECTIONS ===== */
    .directory-section {
      display: none;
      animation: fadeIn 0.25s ease;
    }

    .directory-section:not(.hidden) {
      display: block;
    }

    .section-title {
      font-size: 1.25rem;
      color: #1f3b73;
      margin-bottom: 18px;
      font-weight: 600;
    }

    /* ===== FORMS ===== */
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    label {
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="file"] {
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      font-size: 1rem;
      background: #ffffff;
      transition: border 0.25s ease;
    }

    input[type="text"]:focus,
    input[type="file"]:focus {
      border-color: #1f3b73;
      box-shadow: 0 0 0 3px rgba(31, 59, 115, 0.15);
      outline: none;
    }

    /* ===== BUTTONS ===== */
    button.primary,
    button.secondary {
      border: none;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    button.primary {
      background: #1f3b73;
      color: #fff;
      font-weight: 600;
    }

    button.primary:hover {
      background: #1a3362;
    }

    button.secondary {
      background: #e5e7eb;
      color: #374151;
    }

    button.secondary:hover {
      background: #d8dade;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 15px;
    }

    .actions.justify-end {
      justify-content: flex-end;
    }

    .actions.align-left {
      justify-content: flex-start;
    }

    /* ===== INFO BOX ===== */
    .info-box {
      margin-top: 20px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 15px;
      color: #374151;
      font-size: 0.95rem;
    }

    .info-box.hidden {
      display: none;
    }

    .hint {
      margin-bottom: 15px;
      color: #6b7280;
      font-size: 0.9rem;
    }

    .selected-path {
      margin-left: 8px;
      font-style: italic;
      color: #6b7280;
    }

    /* ===== ANIMATION ===== */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 720px) {
      .page-card {
        padding: 25px 20px;
      }
      .form-row {
        flex-direction: column;
      }
      .directory-options {
        flex-direction: column;
      }
    }
  </style>
</head>
<body class="directory-body">
  <div id="navbarContainer"></div>

  <div class="page-shell directory-shell" style="margin-left: 220px;">
    <section class="page-card directory-card" id="directoryPage">
      <header class="page-header">
        <h1 class="page-title">Directory Setup</h1>
        <p class="page-subtitle">Choose how you would like to prepare the student workspace.</p>
      </header>

      <div class="directory-options">
        <button type="button" id="showCreateBtn" class="secondary">Create New Directory</button>
        <button type="button" id="showExistingBtn" class="secondary">Use Existing Directory</button>
        <button type="button" id="showBulkBtn" class="secondary">Bulk Create from File</button>
      </div>

      <section id="createSection" class="directory-section hidden">
        <h2 class="section-title">Create New Directory</h2>
        <form id="createDirectoryForm">
          <div class="form-row">
            <div class="form-group">
              <label for="createExamName">Exam Name</label>
              <input type="text" id="createExamName" placeholder="TNE20002_SkillExam_8-10am" required />
            </div>
            <div class="form-group">
              <label for="createSessionId">Session ID</label>
              <input type="text" id="createSessionId" placeholder="Session1" required />
            </div>
            <div class="form-group">
              <label for="createStudentId">Student ID</label>
              <input type="text" id="createStudentId" placeholder="101XXXXXX" required />
            </div>
          </div>
          <div class="actions justify-end">
            <button type="submit" id="create-directory-btn" class="primary">Create & Continue</button>
          </div>
        </form>
      </section>

      <section id="existingSection" class="directory-section hidden">
        <h2 class="section-title">Use Existing Directory</h2>
        <p class="hint">Select the existing student folder from Finder to continue.</p>
        <div class="existing-picker">
          <button type="button" class="secondary" id="chooseDirectoryBtn">Choose Folder</button>
          <span id="selectedDirectoryLabel" class="selected-path">No directory selected</span>
        </div>
        <div class="actions align-left">
          <button type="button" class="secondary" id="clearExistingSelectionBtn">Clear</button>
          <button type="button" id="use-existing-btn" class="primary">Use Selected</button>
        </div>
        <div id="existingInfoBox" class="info-box hidden"></div>
      </section>

      <section id="bulkSection" class="directory-section hidden">
        <h2 class="section-title">Bulk Create (CSV/TXT)</h2>
        <form id="bulkCreateForm">
          <div class="form-row">
            <div class="form-group">
              <label for="bulkExamName">Exam Name</label>
              <input type="text" id="bulkExamName" placeholder="TNE20002_SkillExam_8-10am" required />
            </div>
            <div class="form-group">
              <label for="bulkSessionId">Session ID</label>
              <input type="text" id="bulkSessionId" placeholder="Session1" required />
            </div>
            <div class="form-group">
              <label for="bulkFile">Student File</label>
              <input type="file" id="bulkFile" accept=".csv,.txt" required />
            </div>
          </div>
          <div class="actions justify-end">
            <button type="submit" id="bulk-create-btn" class="primary">Create Directories</button>
          </div>
        </form>
        <div id="bulkResults" class="info-box hidden"></div>
      </section>
    </section>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
