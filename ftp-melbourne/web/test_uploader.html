<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Upload Logs</title>
        <style>
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                min-height: 100vh;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            }
            .card {
                background: white;
                border-radius: 12px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                padding: 40px;
                max-width: 500px;
                width: 100%;
            }
            h1 {
                margin: 0 0 8px;
                font-size: 1.8rem;
                color: #1a1a1a;
            }
            .subtitle {
                color: #666;
                margin-bottom: 24px;
                font-size: 0.95rem;
            }
            .field {
                margin-bottom: 20px;
            }
            label {
                display: block;
                font-weight: 600;
                color: #333;
                margin-bottom: 8px;
                font-size: 0.9rem;
            }
            input[type="text"],
            input[type="file"] {
                width: 100%;
                padding: 12px;
                border: 1px solid #ddd;
                border-radius: 8px;
                font: inherit;
                font-size: 1rem;
            }
            input[type="text"]:focus,
            input[type="file"]:focus {
                outline: none;
                border-color: #667eea;
                box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            }
            button {
                width: 100%;
                padding: 12px;
                border: none;
                border-radius: 8px;
                font: inherit;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 200ms;
            }
            .primary {
                background: #667eea;
                color: white;
            }
            .primary:hover {
                background: #5568d3;
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            }
            .primary:active {
                transform: translateY(0);
            }
            #status {
                margin-top: 16px;
                padding: 12px;
                border-radius: 8px;
                text-align: center;
                font-weight: 600;
                display: none;
            }
            #status.success {
                background: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
                display: block;
            }
            #status.error {
                background: #f8d7da;
                color: #721c24;
                border: 1px solid #f5c6cb;
                display: block;
            }
            #status.loading {
                background: #e2e3e5;
                color: #383d41;
                border: 1px solid #d6d8db;
                display: block;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Upload Logs</h1>
            <p class="subtitle">Select a student folder to upload.</p>

            <div class="field">
                <label for="baseUrl">Endpoint URL</label>
                <input
                    id="baseUrl"
                    type="text"
                    placeholder="http://127.0.0.1:6060"
                />
            </div>

            <div class="field">
                <label for="folderInput">Select Student Folder</label>
                <input id="folderInput" type="file" webkitdirectory directory />
            </div>

            <button class="primary" id="uploadBtn">Upload Folder</button>

            <div id="status"></div>
        </div>

        <script>
            const baseUrlInput = document.getElementById("baseUrl");
            const folderInput = document.getElementById("folderInput");
            const uploadBtn = document.getElementById("uploadBtn");
            const statusBox = document.getElementById("status");

            function setStatus(message, type) {
                statusBox.textContent = message;
                statusBox.className = type;
            }

            function guessBaseUrl() {
                return window.location.origin;
            }

            baseUrlInput.value = guessBaseUrl();

            uploadBtn.addEventListener("click", async () => {
                const files = Array.from(folderInput.files || []);
                if (!files.length) {
                    setStatus("Please select a folder.", "error");
                    return;
                }

                const baseUrl = baseUrlInput.value.trim();
                if (!baseUrl) {
                    setStatus("Please enter an endpoint URL.", "error");
                    return;
                }

                setStatus("Uploading...", "loading");
                const form = new FormData();

                files.forEach((file) => {
                    form.append("files", file);
                });

                form.append(
                    "student_id",
                    folderInput.files[0].webkitRelativePath.split("/")[0],
                );

                try {
                    const response = await fetch(`${baseUrl}/api/upload-logs`, {
                        method: "POST",
                        body: form,
                    });

                    if (response.ok) {
                        const data = await response.json();
                        setStatus(
                            `Success! Uploaded ${data.files?.length || files.length} files.`,
                            "success",
                        );
                    } else {
                        const data = await response.json();
                        setStatus(
                            `Failed: ${data.message || "Upload error."}`,
                            "error",
                        );
                    }
                } catch (error) {
                    setStatus(`Error: ${error.message}`, "error");
                }
            });
        </script>
    </body>
</html>
