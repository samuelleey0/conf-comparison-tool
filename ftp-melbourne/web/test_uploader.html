<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Upload Logs</title>
        <style>
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                min-height: 100vh;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            }
            .card {
                background: white;
                border-radius: 12px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                padding: 40px;
                max-width: 500px;
                width: 100%;
            }
            h1 {
                margin: 0 0 8px;
                font-size: 1.8rem;
                color: #1a1a1a;
            }
            .subtitle {
                color: #666;
                margin-bottom: 24px;
                font-size: 0.95rem;
            }
            .field {
                margin-bottom: 20px;
            }
            label {
                display: block;
                font-weight: 600;
                color: #333;
                margin-bottom: 8px;
                font-size: 0.9rem;
            }
            input[type="text"],
            input[type="file"] {
                width: 100%;
                padding: 12px;
                border: 1px solid #ddd;
                border-radius: 8px;
                font: inherit;
                font-size: 1rem;
            }
            input[type="text"]:focus,
            input[type="file"]:focus {
                outline: none;
                border-color: #667eea;
                box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            }
            button {
                width: 100%;
                padding: 12px;
                border: none;
                border-radius: 8px;
                font: inherit;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 200ms;
            }
            .primary {
                background: #667eea;
                color: white;
            }
            .primary:hover {
                background: #5568d3;
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            }
            .primary:active {
                transform: translateY(0);
            }
            #status {
                margin-top: 16px;
                padding: 12px;
                border-radius: 8px;
                text-align: center;
                font-weight: 600;
                display: none;
            }
            #status.success {
                background: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
                display: block;
            }
            #status.error {
                background: #f8d7da;
                color: #721c24;
                border: 1px solid #f5c6cb;
                display: block;
            }
            #status.loading {
                background: #e2e3e5;
                color: #383d41;
                border: 1px solid #d6d8db;
                display: block;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Upload Logs</h1>
            <p class="subtitle">
                Confirm source folder and endpoint, then type yes to upload.
            </p>

            <div class="field">
                <label for="sourceFolder">Selected Source Folder</label>
                <input
                    id="sourceFolder"
                    type="text"
                    readonly
                    placeholder="Loading source folder..."
                />
            </div>

            <div class="field">
                <label for="endpointUrl">Upload Endpoint</label>
                <input
                    id="endpointUrl"
                    type="text"
                    readonly
                    placeholder="Loading endpoint..."
                />
            </div>

            <div class="field">
                <label for="confirmInput">Type yes to confirm upload</label>
                <input
                    id="confirmInput"
                    type="text"
                    placeholder="yes"
                    autocomplete="off"
                />
            </div>

            <button class="primary" id="uploadBtn">Confirm and Upload</button>

            <div id="status"></div>
        </div>

        <script>
            const sourceFolderInput = document.getElementById("sourceFolder");
            const endpointUrlInput = document.getElementById("endpointUrl");
            const confirmInput = document.getElementById("confirmInput");
            const uploadBtn = document.getElementById("uploadBtn");
            const statusBox = document.getElementById("status");

            function setStatus(message, type) {
                statusBox.textContent = message;
                statusBox.className = type;
            }

            function guessBaseUrl() {
                return window.location.origin;
            }

            async function loadSenderConfig() {
                try {
                    const baseUrl = guessBaseUrl();
                    const response = await fetch(
                        `${baseUrl}/api/sender-config`,
                    );
                    const data = await response.json();

                    if (!response.ok || data.status !== "ok") {
                        throw new Error(
                            data.message || "Failed to load sender config.",
                        );
                    }

                    sourceFolderInput.value = data.source_folder || "";
                    endpointUrlInput.value = data.upload_url || "";
                } catch (error) {
                    setStatus(
                        `Error loading config: ${error.message}`,
                        "error",
                    );
                }
            }

            loadSenderConfig();

            uploadBtn.addEventListener("click", async () => {
                if (!sourceFolderInput.value || !endpointUrlInput.value) {
                    setStatus(
                        "Config not loaded yet. Please try again.",
                        "error",
                    );
                    return;
                }

                if (confirmInput.value.trim().toLowerCase() !== "yes") {
                    setStatus("Please type yes to confirm upload.", "error");
                    return;
                }

                setStatus("Uploading...", "loading");

                try {
                    const response = await fetch(
                        `${guessBaseUrl()}/api/sender-upload`,
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({ confirm: "yes" }),
                        },
                    );

                    const data = await response.json();

                    if (
                        response.ok &&
                        (data.status === "ok" || data.status === "partial")
                    ) {
                        setStatus(
                            `Upload finished: ${data.uploaded_file_count || 0} file(s), ${data.student_count || 0} student folder(s).`,
                            "success",
                        );
                    } else {
                        setStatus(
                            `Failed: ${data.message || "Upload error."}`,
                            "error",
                        );
                    }
                } catch (error) {
                    setStatus(`Error: ${error.message}`, "error");
                }
            });
        </script>
    </body>
</html>
