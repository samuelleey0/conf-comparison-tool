<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Connection Setup</title>
  <link rel="stylesheet" href="assets/nav.css" />
  <style>
    /* ===== BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
    }

    body.connection-body {
      background: #f6f7fb;
      color: #2f2f2f;
    }

    /* ===== PAGE LAYOUT ===== */
    .page-shell {
      padding: 40px 50px;
      margin-left: 220px;
    }

    .page-header {
      margin-bottom: 25px;
    }

    .page-title {
  font-size: 2rem;
  font-weight: 700;
  color: #1f3b73;
  letter-spacing: -0.5px;
}

.page-subtitle {
  color: #6b7280;
  font-size: 1rem;
  margin-top: 10px;
}

    /* ===== GRID ===== */
    .connection-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      max-width: 1240px;
      align-items: start;
    }

    /* ===== LEFT PANEL ===== */
    .connection-panel {
      border-top: 1px solid #e0e6f0;
      padding: 20px;
    }

    .section-title {
      font-size: 1.3rem;
      color: #1f3b73;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 15px;
    }

    .inline-options {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    label {
      font-weight: 600;
      font-size: 0.95rem;
      color: #374151;
      margin: 5px;
    }

    input[type="text"],
    input[type="password"] {
      padding: 10px;
      border: 1px solid #cbd5e1;
      font-size: 0.95rem;
      background-color: #ffffff;
    }

    input:focus {
      border-color: #1f3b73;
      outline: none;
      box-shadow: 0 0 0 3px rgba(31, 59, 115, 0.1);
    }

    .hint {
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .info-box {
      margin-top: 12px;
      background: #e8f2ff;
      border: 1px solid #bcd6ff;
      padding: 20px;
      color: #1f3b73;
      font-size: 0.9rem;
    }

    .info-box.hidden {
      display: none;
    }

    /* ===== RIGHT PANEL ===== */
    .connection-status {
      border-top: 1px solid #e0e6f0;
      border-left: 1px solid #e0e6f0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .connection-status__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .connection-status__header h3 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1f3b73;
    }

    .link-btn {
      background: none;
      border: none;
      color: #1f3b73;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .status-panel.modern {
      background: #f7faff;
      border: 1px solid #e3e8f0;
      padding: 16px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-weight: 500;
      color: #374151;
    }

    progress {
      width: 100%;
      height: 20px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    progress::-webkit-progress-bar {
      background-color: #e5e7eb;
    }

    progress::-webkit-progress-value {
      background-color: #1f3b73;
    }

    .progress-value {
      font-weight: 600;
      color: #1f3b73;
      font-size: 0.9rem;
    }

    .log {
      background: #0f172a;
      color: #e2e8f0;
      font-family: monospace;
      padding: 15px;
      height: 350px;
      overflow-y: auto;
      font-size: 0.8rem;
      border: 1px solid #1e293b;
      white-space: pre-wrap;
    }

    /* ===== BUTTONS ===== */
    button {
      border: none;
      padding: 10px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.25s ease;
    }

    button.primary {
      background: #1f3b73;
      color: #fff;
      font-weight: 600;
    }

    button.primary:hover {
      background: #173263;
    }

    button.secondary {
      background: #e5e7eb;
      color: #374151;
    }

    button.secondary:hover {
      background: #d8dade;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .hidden {
      display: none;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .connection-layout {
        grid-template-columns: 1fr;
      }

      .page-shell {
        margin-left: 0;
        padding: 20px;
      }

      .actions {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body class="connection-body">
  <div id="navbarContainer"></div>

  <div class="page-shell connection-shell">
    <header class="page-header">
      <div>
        <h1 class="page-title">Connection & Execution</h1>
        <p class="page-subtitle">Confirm how you will connect and monitor the live run results.</p>
      </div>
    </header>

    <div class="connection-layout" id="connectionPage">
      <section class="connection-panel page-card">
        <h2 class="section-title">Connection Setup</h2>
        <form id="connectionForm">
          <div class="form-group">
            <label><input type="radio" name="connType" value="serial" checked /> Serial</label>
            <label><input type="radio" name="connType" value="ssh" /> SSH</label>
          </div>

          <div id="serialFields">
            <p class="hint">Choose the preset that matches your system or select custom.</p>
            <div class="inline-options">
              <label><input type="radio" name="serialPreset" value="linux" checked /> Linux (/dev/ttyUSB0)</label>
              <label><input type="radio" name="serialPreset" value="windows" /> Windows (COM3)</label>
              <label><input type="radio" name="serialPreset" value="mac" /> macOS (/dev/cu.usbserial-10)</label>
              <label><input type="radio" name="serialPreset" value="custom" /> Custom</label>
            </div>
            <label for="serialPort">Serial Port</label>
            <input type="text" id="serialPort" placeholder="/dev/ttyUSB0" />
          </div>

          <div id="sshFields" class="hidden">
            <label for="sshHost">SSH Host</label><br>
            <input type="text" id="sshHost" placeholder="192.168.1.1" /><br>
            <label for="sshUser">SSH Username</label><br>
            <input type="text" id="sshUser" placeholder="admin" /><br>
            <label for="sshPass">SSH Password</label><br>
            <input type="password" id="sshPass" placeholder="Password" />
          </div>
        </form>
        <div id="selectedCommandsInfo" class="info-box hidden"></div>
      </section>

      <section class="connection-status">
        <header class="connection-status__header">
          <h3>Execution Status</h3>
          <button type="button" id="clearLogBtn" class="link-btn">Clear Log</button>
        </header>
        <div class="status-panel modern">
          <div class="progress-row">
            <label for="progress">Progress</label>
            <span id="progressValue" class="progress-value">0%</span>
          </div>
          <progress id="progress" value="0" max="100"></progress>
          <pre id="log" class="log"></pre>
        </div>
        <div class="actions justify-end">
          <button type="button" id="reconnectRunBtn" class="secondary">Reconnect &amp; Run</button>
          <button type="button" id="startExecutionBtn" class="primary">Run Selected Commands</button>
        </div>
      </section>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
