<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Welcome | Automated Cisco Configuration & Marking System</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>

<body class="welcome-body" id="welcomePage">
  <div class="welcome-hero">

    <div class="welcome-content formal">
      <div class="welcome-header">
        <img src="assets/cisco-logo.svg" alt="Cisco Logo" class="logo cisco-logo" />
        <img src="assets/swinburne-logo.svg" alt="Swinburne Logo" class="logo swinburne-logo" />
      </div>

      <div class="welcome-text">
        <h2>Cisco Configuration System</h2>
        <p>Developed by Swinburne University Sarawak Campus</p>
        <div class="divider"></div>
      </div>

      <div class="loading-line"></div>

      <div class="welcome-actions">
        <button type="button" id="startSetupBtn" class="primary">Begin Setup</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>

</html>
