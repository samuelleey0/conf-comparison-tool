<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Connection Setup</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/nav.css" />
</head>

<body class="connection-body">
  <div id="navbarContainer"></div>

  <div class="page-shell connection-shell">
    <header class="page-header">
      <div>
        <h1 class="page-title">Connection & Execution</h1>
        <p class="page-subtitle">Confirm how you will connect and monitor the live run results.</p>
      </div>
    </header>

    <div class="connection-layout" id="connectionPage">
      <section class="connection-panel page-card">
        <h2 class="section-title">Connection Setup</h2>
        <form id="connectionForm">
          <div class="form-group connection-queue">
            <div class="connection-queue__header">
               <label>Device Queue</label>
               <span id="queueStatus" class="connection-queue__status">Idle</span>
            </div>
            <div id="deviceQueueContainer" class="connection-queue__list">
               <!-- Populated by JS -->
            </div>
          </div>
          <div class="form-group connection-mode-group">
            <label class="choice-label"><input type="radio" name="connType" value="serial" /> Serial</label>
            <label class="choice-label"><input type="radio" name="connType" value="ssh" /> SSH</label>
          </div>

          <div id="serialFields">
            <p class="hint">Choose the preset that matches your system or select custom.</p>
            <div class="inline-options connection-preset-grid">
              <label class="choice-label connection-preset-option"><input type="radio" name="serialPreset" value="linux_usb" checked /> Linux USB-Serial
                (/dev/ttyUSB0)</label>
              <label class="choice-label connection-preset-option"><input type="radio" name="serialPreset" value="linux_rs232" /> Linux
                RS232 (/dev/ttyS0)</label>
              <label class="choice-label connection-preset-option"><input type="radio" name="serialPreset" value="windows" /> Windows
                (COM3)</label>
              <label class="choice-label connection-preset-option"><input type="radio" name="serialPreset" value="mac" /> macOS
                (/dev/cu.usbserial-10)</label>
              <label class="choice-label connection-preset-option"><input type="radio" name="serialPreset" value="custom" /> Custom</label>
            </div>
            <label for="serialPort">Serial Port</label>
            <input type="text" id="serialPort" placeholder="/dev/ttyUSB0" />
          </div>

          <div id="sshFields" class="hidden connection-ssh-grid">
            <div class="form-group">
              <label for="sshHost">SSH Host</label>
              <input type="text" id="sshHost" placeholder="192.168.1.1" />
            </div>
            <div class="form-group">
              <label for="sshPort">SSH Port</label>
              <input type="text" id="sshPort" placeholder="22" />
            </div>
            <div class="form-group">
              <label for="sshUser">SSH Username</label>
              <input type="text" id="sshUser" placeholder="admin" />
            </div>
            <div class="form-group">
              <label for="sshPass">SSH Password</label>
              <input type="password" id="sshPass" placeholder="Password" />
            </div>
          </div>
        </form>
        <div id="selectedCommandsInfo" class="info-box hidden"></div>
      </section>

      <section class="connection-status">
        <header class="connection-status__header">
          <h3>Execution Status</h3>
          <button type="button" id="clearLogBtn" class="link-btn">Clear Log</button>
        </header>
        <div class="status-panel modern">
          <div class="progress-row">
            <label for="progress">Progress</label>
            <span id="progressValue" class="progress-value">0%</span>
          </div>
          <progress id="progress" value="0" max="100"></progress>
          <pre id="log" class="log"></pre>
        </div>
        <div class="actions justify-end connection-reset-row">
          <label for="resetDeviceType" class="connection-reset-row__label">Reset As</label>
          <select id="resetDeviceType" class="connection-reset-row__select">
            <option value="switch" selected>Switch</option>
            <option value="router">Router</option>
          </select>
        </div>
        <div class="actions justify-end connection-action-grid">
          <button type="button" id="abortExecutionBtn" class="danger connection-action-grid__abort" style="display: none;">⏹ Stop Execution</button>
          <button type="button" id="resetDeviceBtn" class="danger">Reset Cisco Device</button>
          <button type="button" id="startSequenceBtn" class="primary">Start Auto-Execution Sequence</button>
          <button type="button" id="doneStudentBtn" class="primary connection-action-grid__done"
            disabled>Done (Next Student)</button>
        </div>
      </section>
    </div>
  </div>

  <script src="renderer.js"></script>
  <script src="commands.js"></script>
  <script src="connection.js"></script>
</body>

</html>
