<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device & Rubric Setup</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/nav.css" />
  <link rel="stylesheet" href="assets/device_setup.css" />
  
</head>

<body class="device-setup-body">
  <div id="navbarContainer"></div>

  <div class="page-shell">
    <section class="page-card" id="deviceSetupPage">
      <header class="page-header">
        <h1 class="page-title">Device & Rubric Setup</h1>
        <p class="page-subtitle">Configure devices, map commands, and upload perfect rubrics for the grading engine.</p>
      </header>

      <div class="form-group" style="margin-bottom: 24px;">
        <label for="templateName">Template Name (e.g. TNE10016)</label>
        <input type="text" id="templateName" placeholder="TNE10016" required />
      </div>
      <div class="form-group" style="margin-bottom: 24px;">
        <label for="templateSelect">Load Existing Template</label>
        <div style="display: flex; gap: 10px; align-items: center;">
          <div id="templateSelect" class="app-select" style="flex: 1;"></div>
          <button type="button" id="loadTemplateBtn" class="secondary">Load</button>
        </div>
      </div>

      <div id="devicesContainer">
        <!-- Devices injected dynamically -->
      </div>

      <div style="margin-bottom: 24px;">
        <button type="button" id="addDeviceBtn" class="secondary">+ Add Device</button>
        <button type="button" id="clearSetupBtn" class="secondary" style="margin-left: 8px;">Clear All</button>
      </div>

      <div class="actions justify-end">
        <button type="button" id="saveTemplateBtn" class="primary">Save Template & Continue</button>
      </div>
    </section>
  </div>

  <script src="renderer.js"></script>
  <script src="device_setup.js"></script>
</body>

</html>
