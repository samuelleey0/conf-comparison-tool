<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device & Rubric Setup</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/nav.css" />
  <style>
    .device-block {
      background: var(--color-bg-soft);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      position: relative;
    }

    .device-block-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 12px;
      overflow: visible;
    }

    .remove-device-btn {
      background: none;
      border: none;
      color: var(--color-danger, #e74c3c);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: bold;
    }

    .command-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .command-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--color-bg-card);
      padding: 8px 12px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
    }

    .command-item input[type="text"] {
      flex: 1;
      padding: 6px;
    }

    .command-item input[type="file"] {
      max-width: 250px;
    }

    .device-footer {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
    }

    .custom-dropdown {
      position: relative;
      user-select: none;
      width: 300px;
      min-width: 200px;
      flex-shrink: 1;
      z-index: 100;
    }

    .device-block-header label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
    }

    .device-block-header .hostname-input {
      height: 38px;
    }

    .dropdown-header {
      background: #fff;
      border: 1px solid var(--color-border);
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 38px;
    }

    @media (max-width: 900px) {
      .device-block-header {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .device-block-header label {
        width: 100%;
      }

      .device-block-header .hostname-input {
        width: 100%;
      }

      .custom-dropdown {
        width: 100%;
      }

      .remove-device-btn {
        width: 100%;
        text-align: left;
      }
    }

    @media (max-width: 480px) {
      .device-block {
        padding: 12px;
      }

      .command-item {
        flex-wrap: wrap;
        gap: 6px;
      }

      .command-item input[type="file"] {
        max-width: 100%;
        width: 100%;
      }
    }

    .dropdown-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      width: 100%;
      background: #fff;
      border: 1px solid var(--color-border);
      border-top: none;
      border-radius: 0 0 4px 4px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 1000;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .dropdown-search {
      position: sticky;
      top: 0;
      background: #fff;
      padding: 10px;
      border-bottom: 1px solid var(--color-border);
      z-index: 1;
    }

    .dropdown-search input {
      width: 100%;
      padding: 8px 10px;
      font-size: 0.9rem;
    }

    .dropdown-item {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .dropdown-item:hover {
      background: var(--color-bg-soft);
    }

    .dropdown-item input[type="checkbox"] {
      cursor: pointer;
      width: 16px;
      height: 16px;
    }

    .dropdown-empty {
      padding: 10px 12px;
      color: var(--color-muted);
      font-size: 0.9rem;
    }
  </style>
</head>

<body class="device-setup-body">
  <div id="navbarContainer"></div>

  <div class="page-shell">
    <section class="page-card" id="deviceSetupPage">
      <header class="page-header">
        <h1 class="page-title">Device & Rubric Setup</h1>
        <p class="page-subtitle">Configure devices, map commands, and upload perfect rubrics for the grading engine.</p>
      </header>

      <div class="form-group" style="margin-bottom: 24px;">
        <label for="templateName">Template Name (e.g. TNE10016)</label>
        <input type="text" id="templateName" placeholder="TNE10016" required />
      </div>
      <div class="form-group" style="margin-bottom: 24px;">
        <label for="templateSelect">Load Existing Template</label>
        <div style="display: flex; gap: 10px; align-items: center;">
          <div id="templateSelect" class="app-select" style="flex: 1;"></div>
          <button type="button" id="loadTemplateBtn" class="secondary">Load</button>
        </div>
      </div>

      <div id="devicesContainer">
        <!-- Devices injected dynamically -->
      </div>

      <div style="margin-bottom: 24px;">
        <button type="button" id="addDeviceBtn" class="secondary">+ Add Device</button>
        <button type="button" id="clearSetupBtn" class="secondary" style="margin-left: 8px;">Clear All</button>
      </div>

      <div class="actions justify-end">
        <button type="button" id="saveTemplateBtn" class="primary">Save Template & Continue</button>
      </div>
    </section>
  </div>

  <script src="renderer.js"></script>
  <script src="device_setup.js"></script>
</body>

</html>
