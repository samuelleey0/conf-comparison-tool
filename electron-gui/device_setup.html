<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device & Rubric Setup</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/nav.css" />
  <style>
    /* Page Layout */
    #deviceSetupPage {
      max-width: 100%;
      margin: 0 auto;
      overflow: visible;
    }

    #deviceSetupPage .page-header {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 2px solid var(--color-border);
    }

    /* Section Styling */
    .setup-section {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 0;
      padding: 28px;
      margin-bottom: 32px;
      box-shadow: 0 2px 8px rgba(15, 23, 46, 0.04);
      overflow: visible;
    }

    .section-header {
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--color-heading);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-subtitle {
      font-size: 0.9rem;
      color: var(--color-muted);
      line-height: 1.4;
    }

    /* Form Groups */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-row.full {
      grid-template-columns: 1fr;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--color-heading);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .form-group input,
    .form-group select {
      padding: 11px 14px;
      border: 1px solid var(--color-border);
      border-radius: 0;
      font-size: 0.95rem;
      background: var(--color-surface);
      transition: all 0.2s ease;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 0 4px rgba(10, 92, 187, 0.08);
    }

    /* Device Blocks */
    .device-block {
      background: var(--color-surface);
      border: 2px solid var(--color-border);
      border-radius: 0;
      padding: 24px;
      margin-bottom: 20px;
      position: relative;
      transition: all 0.2s ease;
      overflow: visible;
    }

    .device-block:hover {
      border-color: var(--color-accent);
      box-shadow: 0 4px 12px rgba(10, 92, 187, 0.08);
    }

    .device-block-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--color-border);
      overflow: visible;
    }

    .device-block-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-heading);
      flex: 0 0 auto;
    }

    .remove-device-btn {
      background: none;
      border: none;
      color: var(--color-danger);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 0;
      transition: all 0.2s ease;
    }

    .remove-device-btn:hover {
      background: rgba(197, 62, 62, 0.1);
      color: var(--color-danger);
    }

    /* Command List */
    .command-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      z-index: auto;
    }

    .command-section-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--color-muted);
      margin-top: 16px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .command-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--color-bg-soft);
      padding: 12px 14px;
      border: 1px solid var(--color-border);
      border-radius: 0;
      transition: all 0.2s ease;
      position: relative;
      z-index: auto;
    }

    .command-item:focus-within {
      border-color: var(--color-accent);
      background: rgba(10, 92, 187, 0.02);
    }

    .command-item input[type="text"] {
      flex: 1;
      padding: 8px 10px;
      border: none;
      background: var(--color-surface);
      border-radius: 0;
      font-size: 0.9rem;
    }

    .command-item input[type="file"] {
      max-width: 260px;
      padding: 6px 10px;
      font-size: 0.85rem;
    }

    .command-remove-btn {
      background: none;
      border: none;
      color: var(--color-danger);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .command-remove-btn:hover {
      background: rgba(197, 62, 62, 0.1);
    }

    /* Device Footer */
    .device-footer {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--color-border);
    }

    /* Custom Dropdown */
    .custom-dropdown {
      position: relative;
      user-select: none;
      width: 100%;
      z-index: 999999;
    }

    .device-block-header label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-weight: 600;
    }

    .device-block-header .hostname-input {
      height: 42px;
      padding: 10px 14px;
    }

    .dropdown-header {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      padding: 10px 14px;
      border-radius: 0;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 42px;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      position: relative;
      z-index: auto;
    }

    .dropdown-header:hover {
      border-color: var(--color-accent);
    }

    .dropdown-list {
      position: fixed;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 0;
      max-height: 220px;
      overflow-y: auto;
      z-index: 999999;
      box-shadow: 0 6px 16px rgba(15, 23, 46, 0.12);
      width: 100%;
      min-width: 300px;
    }

    .dropdown-list.hidden {
      display: none;
    }

    .dropdown-item {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .dropdown-item:hover {
      background: var(--color-accent);
      color: white;
    }

    .dropdown-item input[type="checkbox"] {
      cursor: pointer;
      width: 16px;
      height: 16px;
      accent-color: var(--color-accent);
    }

    /* Action Buttons */
    .device-actions {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }

    .device-actions button {
      padding: 11px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 0;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .add-device-action {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .add-device-action button {
      padding: 11px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 0;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .add-device-btn {
      background: var(--color-accent);
      color: white;
      border: none;
    }

    .add-device-btn:hover {
      background: var(--color-primary);
      box-shadow: 0 4px 12px rgba(10, 92, 187, 0.3);
    }

    .clear-setup-btn {
      background: var(--color-bg-soft);
      color: var(--color-heading);
      border: 1px solid var(--color-border);
    }

    .clear-setup-btn:hover {
      background: var(--color-border);
      border-color: var(--color-muted);
    }

    .load-template-btn {
      background: var(--color-accent);
      color: white;
      border: none;
      padding: 10px 16px;
      font-weight: 600;
      border-radius: 0;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .load-template-btn:hover {
      background: var(--color-primary);
      box-shadow: 0 4px 12px rgba(10, 92, 187, 0.3);
    }

    /* Media Queries */
    @media (max-width: 900px) {
      .form-row {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .device-block-header {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }

      .device-block-header label {
        width: 100%;
      }

      .device-block-header .hostname-input {
        width: 100%;
      }

      .custom-dropdown {
        width: 100%;
      }

      .remove-device-btn {
        width: 100%;
        text-align: left;
      }
    }

    @media (max-width: 600px) {
      .setup-section {
        padding: 20px;
        margin-bottom: 24px;
      }

      .device-block {
        padding: 16px;
      }

      .command-item {
        flex-wrap: wrap;
        gap: 8px;
      }

      .command-item input[type="file"] {
        max-width: 100%;
        width: 100%;
      }

      .device-actions {
        flex-direction: column;
      }

      .device-actions button {
        width: 100%;
      }

      .add-device-action {
        flex-direction: column;
      }

      .add-device-action button {
        width: 100%;
      }
    }
  </style>
</head>

<body class="device-setup-body">
  <div id="navbarContainer"></div>

  <div class="page-shell">
    <section class="page-card" id="deviceSetupPage" style="width:100%; border-radius: 0;">
      <header class="page-header">
        <h1 class="page-title">Device & Rubric Setup</h1>
        <p class="page-subtitle">Configure devices, map commands, and upload perfect rubrics for the grading engine.</p>
      </header>

      <!-- Template Configuration Section -->
      <div class="setup-section">
        <div class="section-header">
          <div class="section-title">📋 Template Configuration</div>
          <p class="section-subtitle">Create a new template or load an existing one</p>
        </div>

        <div class="form-row full">
          <div class="form-group">
            <label for="templateName">Template Name</label>
            <input type="text" id="templateName" placeholder="e.g. TNE10016" required />
          </div>
        </div>

        <div class="form-row full">
          <div class="form-group">
            <label for="templateSelect">Load Existing Template</label>
            <div style="display: flex; gap: 12px; align-items: flex-end;">
              <select id="templateSelect" style="flex: 1;"></select>
              <button type="button" id="loadTemplateBtn" class="load-template-btn">Load</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Devices Configuration Section -->
      <div class="setup-section">
        <div class="section-header">
          <div class="section-title">🖥️ Device Configuration</div>
          <p class="section-subtitle">Add and configure network devices</p>
        </div>

        <div id="devicesContainer">
          <!-- Devices injected dynamically -->
        </div>

        <div class="add-device-action">
          <button type="button" id="addDeviceBtn" class="add-device-btn">+ Add Device</button>
          <button type="button" id="clearSetupBtn" class="clear-setup-btn">Clear All</button>
        </div>
      </div>

      <!-- Action Section -->
      <div class="device-actions">
        <button type="button" id="saveTemplateBtn" class="primary" style="flex: 1;">Save Template & Continue</button>
      </div>
    </section>
  </div>

  <script src="renderer.js"></script>
  <script src="device_setup.js"></script>
</body>

</html>
