<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Select Commands</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/nav.css" />
</head>
<body class="commands-body">
  <div id="navbarContainer"></div>

  <div class="page-shell commands-shell">
    <header class="page-header">
      <div>
        <h1 class="page-title">Command Selection</h1>
        <p class="page-subtitle">Review the catalog, add new commands, and choose what to execute.</p>
      </div>
    </header>

    <div class="commands-layout" id="commandsPage">
      <aside class="commands-sidebar page-card">
        <h2 class="section-title">Command Library</h2>
        <p class="hint">Select the commands to execute or add new ones below.</p>
        <div class="command-actions stacked">
          <input type="text" id="newCommandInput" placeholder="Enter new command" />
          <button type="button" id="addCommandBtn" class="primary block">Add Command</button>
          <button type="button" id="refreshCommandsBtn" class="secondary block">Refresh</button>
        </div>
      </aside>

      <main class="commands-main">
        <section class="commands-card page-card fill">
          <header class="card-header">
            <div>
              <h2 class="card-title">Available Commands</h2>
              <span id="commandCount" class="badge">0 selected</span>
            </div>
            <button type="button" id="selectAllBtn" class="link-btn">Select All</button>
          </header>
          <div id="commandsList" class="command-grid">
            <p>Loading commands...</p>
          </div>
          <div class="actions justify-end">
            <button type="button" id="startExecutionBtn" class="primary">Run Selected Commands</button>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
