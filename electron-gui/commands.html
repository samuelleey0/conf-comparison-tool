<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Select Commands</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="container wide" id="commandsPage">
    <h2>Command Selection</h2>

    <div class="command-actions">
      <input type="text" id="newCommandInput" placeholder="Enter new command" />
      <button type="button" id="addCommandBtn">Add Command</button>
      <button type="button" id="refreshCommandsBtn">Refresh List</button>
    </div>

    <div id="commandsList" class="list-box">
      <p>Loading commands...</p>
    </div>

    <div class="actions">
      <button type="button" id="startExecutionBtn">Execute Commands</button>
      <button type="button" id="backToConnectionBtn">Back to Connection</button>
    </div>

    <div class="status-panel">
      <label for="progress">Progress</label>
      <progress id="progress" value="0" max="100"></progress>
      <pre id="log" class="log"></pre>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
