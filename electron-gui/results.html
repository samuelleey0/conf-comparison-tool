<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Comparison Results</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/nav.css" />
  <style>
    .results-layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 20px;
      margin-top: 20px;
      align-items: start;
    }

    .results-list {
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-bg-card);
      overflow: hidden;
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
    }

    .results-list-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--color-border);
      font-weight: 600;
    }

    .results-list-body {
      overflow-y: auto;
    }

    .student-result-item {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .student-result-item:last-child {
      border-bottom: none;
    }

    .student-result-item.selected {
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.9), 0 10px 24px rgba(0, 0, 0, 0.12);
      transform: translateY(-1px);
    }

    .status-pass {
      background: linear-gradient(135deg, #dff6e6 0%, #ccefd7 100%);
      color: #13361f;
    }

    .status-fail {
      background: linear-gradient(135deg, #fde2e2 0%, #f6c9c9 100%);
      color: #5b1f1f;
    }

    .status-missing {
      background: linear-gradient(135deg, #eef1f5 0%, #e0e6ee 100%);
      color: var(--color-text-muted);
    }

    .student-result-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
    }

    .student-breakdown {
      font-size: 0.82rem;
      opacity: 0.85;
    }

    .report-card {
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 16px;
      background: var(--color-bg-card);
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .report-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-box {
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 10px 12px;
      background: var(--color-bg-soft);
    }

    .summary-box div {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .summary-pass {
      background: linear-gradient(135deg, #dff6e6 0%, #ccefd7 100%);
      color: #13361f;
    }

    .summary-fail {
      background: linear-gradient(135deg, #fde2e2 0%, #f6c9c9 100%);
      color: #5b1f1f;
    }

    .report-section {
      margin-top: 16px;
    }

    .report-details {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding-right: 4px;
    }

    .result-item {
      padding: 8px 10px;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      margin-bottom: 8px;
      background: #fff;
      cursor: pointer;
    }

    .result-item .meta {
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }

    .result-item .result-code {
      font-size: 0.8rem;
      color: var(--color-muted);
      margin-bottom: 4px;
    }

    .result-item .status {
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
    }

    .severity-major {
      color: var(--color-danger);
    }

    .severity-minor {
      color: #ff9800;
    }

    .severity-verified {
      color: #6b7280;
      font-style: italic;
    }

    .severity-skipped {
      color: #1e4f8a;
    }

    .result-item.result-item--dedup {
      opacity: 0.7;
      border-left: 3px solid #9ca3af;
    }

    .result-item.result-item--skipped {
      background: linear-gradient(135deg, #eaf3ff 0%, #dceaff 100%);
      border-left: 4px solid #2f6db2;
      box-shadow: inset 0 0 0 1px rgba(47, 109, 178, 0.08);
    }

    .dedup-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 1px 6px;
      border-radius: 4px;
      background: #f3f4f6;
      color: #6b7280;
      font-weight: 600;
      letter-spacing: 0.03em;
      margin-left: 6px;
      vertical-align: middle;
    }

    .dedup-ref {
      font-size: 0.78rem;
      color: #6b7280;
      margin-top: 2px;
      padding: 3px 0;
    }

    .dedup-ref strong {
      color: #4b5563;
    }
    .result-values {
      margin-top: 6px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .result-values pre {
      background: var(--color-bg-soft);
      padding: 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      overflow-x: auto;
      max-height: 220px;
    }

    .context-modal {
      position: fixed;
      inset: 0;
      background: rgba(18, 25, 38, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 2000;
    }

    .context-modal.open {
      display: flex;
    }

    .context-modal-card {
      width: min(1100px, 100%);
      max-height: min(85vh, 920px);
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .context-modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-bg-card);
    }

    .context-modal-title {
      margin: 0;
      font-size: 1.05rem;
    }

    .context-modal-meta {
      margin-top: 4px;
      font-size: 0.85rem;
      color: var(--color-text-muted);
      word-break: break-word;
    }

    .context-close {
      border: 1px solid var(--color-border);
      background: #fff;
      color: #000;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .context-close:hover {
      background: #000;
      color: #fff;
      border-color: #000;
    }

    .context-modal-body {
      display: flex;
      flex-direction: column;
      padding: 16px 18px 18px;
      overflow: auto;
    }

    .context-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .context-tab {
      border: 1px solid var(--color-border);
      background: #fff;
      color: #000;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .context-tab.active {
      background: #000;
      color: #fff;
      border-color: #000;
    }

    .context-tab-panel {
      display: none;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .context-tab-panel.active {
      display: grid;
    }

    .context-pane {
      border: 1px solid var(--color-border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--color-bg-card);
      min-width: 0;
    }

    .context-pane-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-bg-soft);
    }

    .context-pane-header strong {
      display: block;
    }

    .context-pane-path {
      margin-top: 4px;
      font-size: 0.78rem;
      color: var(--color-text-muted);
      word-break: break-word;
    }

    .context-pane pre {
      margin: 0;
      padding: 14px;
      font-size: 0.82rem;
      overflow: auto;
      max-height: 56vh;
      background: #fff;
    }

    @media (max-width: 900px) {
      .results-layout {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .results-list {
        position: static;
        max-height: none;
      }
      .report-card {
        position: static;
        max-height: none;
      }
      .report-summary {
        grid-template-columns: 1fr;
      }
      .result-values {
        grid-template-columns: 1fr;
      }
      .report-card {
        min-height: auto;
        padding: 12px;
      }
      .report-details {
        overflow: visible;
        padding-right: 0;
      }
      .context-modal {
        padding: 12px;
      }
      .context-modal-body {
        overflow: auto;
      }
      .context-tab-panel {
        grid-template-columns: 1fr;
      }
      .context-pane pre {
        max-height: none;
      }
      .result-item {
        overflow-wrap: anywhere;
      }
      .result-values pre {
        white-space: pre-wrap;
      }
    }
  </style>
</head>
<body class="directory-body">
  <div id="navbarContainer"></div>

  <div class="page-shell">
    <section class="page-card">
      <header class="page-header">
        <h1 class="page-title">Comparison Results</h1>
        <p class="page-subtitle">Run the comparison engine and review pass/fail status per student.</p>
      </header>

      <div class="actions align-left" style="gap: 10px; margin-bottom: 12px;">
        <button type="button" id="runComparisonBtn" class="primary">Run Comparison</button>
        <span id="sessionLabel" class="hint"></span>
      </div>

      <div class="results-layout">
        <aside class="results-list">
          <div class="results-list-header">Students</div>
          <div class="results-list-body" id="resultsList"></div>
        </aside>

        <section class="report-card" id="reportPanel">
          <p class="hint">Select a student to view the full report.</p>
        </section>
      </div>
    </section>
  </div>

  <div id="errorContextModal" class="context-modal" aria-hidden="true">
    <div class="context-modal-card">
      <div class="context-modal-header">
        <div>
          <h3 id="errorContextTitle" class="context-modal-title">Config Context</h3>
          <div id="errorContextMeta" class="context-modal-meta"></div>
        </div>
        <button type="button" id="closeErrorContextBtn" class="context-close">Close</button>
      </div>
      <div id="errorContextBody" class="context-modal-body"></div>
    </div>
  </div>

  <script src="renderer.js"></script>
  <script src="results.js"></script>
</body>
</html>
