<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Comparison Results</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/nav.css" />
  <style>
    .results-layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 20px;
      margin-top: 20px;
      align-items: start;
    }

    .results-list {
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-bg-card);
      overflow: hidden;
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
    }

    .results-list-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--color-border);
      font-weight: 600;
    }

    .results-list-body {
      overflow-y: auto;
    }

    .student-result-item {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .student-result-item:last-child {
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .student-result-item.selected {
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.9), 0 10px 24px rgba(0, 0, 0, 0.12);
      transform: translateY(-1px);
    }

    .status-pass {
      background: #dcfce7 !important;
      border-color: #22c55e !important;
      color: #14532d !important;
    }

    .status-fail {
      background: #fee2e2 !important;
      border-color: #dc2626 !important;
      color: #7f1d1d !important;
    }

    .status-missing {
      background: #e2e8f0 !important;
      border-color: #64748b !important;
      color: #334155 !important;
    }

    .student-result-item.status-pass:hover {
      background: #bbf7d0 !important;
      border-color: #15803d !important;
      color: #052e16 !important;
    }

    .student-result-item.status-fail:hover {
      background: #fecaca !important;
      border-color: #b91c1c !important;
      color: #450a0a !important;
    }

    .student-result-item.status-missing:hover {
      background: #cbd5e1 !important;
      border-color: #475569 !important;
      color: #0f172a !important;
    }

    .student-result-item.status-pass.selected,
    .student-result-item.status-pass.selected:hover {
      background: #86efac !important;
      border-color: #166534 !important;
      color: #052e16 !important;
    }

    .student-result-item.status-fail.selected,
    .student-result-item.status-fail.selected:hover {
      background: #fca5a5 !important;
      border-color: #991b1b !important;
      color: #450a0a !important;
    }

    .student-result-item.status-missing.selected,
    .student-result-item.status-missing.selected:hover {
      background: #94a3b8 !important;
      border-color: #334155 !important;
      color: #0f172a !important;
    }

    .student-result-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
    }

    .student-breakdown {
      font-size: 0.82rem;
      opacity: 0.85;
      color: inherit !important;
    }

    .report-card {
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 16px;
      background: var(--color-bg-card);
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .report-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-box {
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 10px 12px;
      background: var(--color-bg-soft);
    }

    .summary-box div {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .summary-pass {
      background: linear-gradient(135deg, #dff6e6 0%, #ccefd7 100%);
      color: #13361f;
    }

    .summary-fail {
      background: linear-gradient(135deg, #fde2e2 0%, #f6c9c9 100%);
      color: #5b1f1f;
    }

    .report-section {
      margin-top: 16px;
    }

    .report-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .report-section-header h3 {
      margin: 0;
    }

    .raw-preview-btn {
      align-items: center;
      border: 1px solid rgba(31, 59, 115, 0.28);
      background: rgba(31, 59, 115, 0.08);
      color: var(--color-primary);
      border-radius: 6px;
      display: inline-flex;
      font-size: 0.82rem;
      font-weight: 700;
      height: 34px;
      justify-content: center;
      letter-spacing: 0;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      width: 42px;
    }

    .raw-preview-btn:hover {
      background: var(--color-primary) !important;
      color: #fff !important;
      border-color: var(--color-primary) !important;
    }

    .raw-preview-btn span {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.88rem;
      font-weight: 800;
      transform: translateY(-1px);
    }

    .raw-command-layout {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }

    .raw-command-toolbar {
      border: 1px solid var(--color-border);
      border-radius: 10px;
      background: var(--color-bg-soft);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .raw-command-label {
      color: var(--color-text-muted);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin: 2px 2px 0;
      text-transform: uppercase;
    }

    .raw-command-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-height: 168px;
      overflow: auto;
      padding-right: 2px;
    }

    .raw-command-btn {
      border: 1px solid transparent;
      border-radius: 8px;
      background: #fff;
      color: var(--color-heading);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 11px;
      text-align: left;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      flex: 1 1 280px;
      min-width: min(320px, 100%);
      max-width: 100%;
    }

    .raw-command-btn:hover {
      background: rgba(31, 59, 115, 0.08) !important;
      border-color: rgba(31, 59, 115, 0.25) !important;
      color: var(--color-primary) !important;
    }

    .raw-command-btn.active {
      background: var(--color-primary) !important;
      border-color: var(--color-primary) !important;
      color: #fff !important;
    }

    .raw-command-btn span {
      font-weight: 800;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .raw-command-btn small {
      font-size: 0.72rem;
      line-height: 1.25;
      opacity: 0.76;
    }

    .raw-command-preview {
      min-width: 0;
    }

    .raw-command-empty {
      align-items: center;
      border: 1px dashed var(--color-border);
      border-radius: 10px;
      color: var(--color-text-muted);
      display: flex;
      justify-content: center;
      min-height: 260px;
      padding: 24px;
      text-align: center;
    }

    .report-details {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding-right: 4px;
    }

    .result-item {
      padding: 8px 10px;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      margin-bottom: 8px;
      background: #fff;
      cursor: pointer;
    }

    .result-item .meta {
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }

    .result-item .result-code {
      font-size: 0.8rem;
      color: var(--color-muted);
      margin-bottom: 4px;
    }

    .result-item .status {
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
    }

    .severity-major {
      color: var(--color-danger);
    }

    .severity-minor {
      color: #ff9800;
    }

    .severity-verified {
      color: #6b7280;
      font-style: italic;
    }

    .severity-skipped {
      color: #1e4f8a;
    }

    .result-item.result-item--dedup {
      opacity: 0.7;
      border-left: 3px solid #9ca3af;
    }

    .result-item.result-item--skipped {
      background: linear-gradient(135deg, #eaf3ff 0%, #dceaff 100%);
      border-left: 4px solid #2f6db2;
      box-shadow: inset 0 0 0 1px rgba(47, 109, 178, 0.08);
    }

    .dedup-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 1px 6px;
      border-radius: 4px;
      background: #f3f4f6;
      color: #6b7280;
      font-weight: 600;
      letter-spacing: 0.03em;
      margin-left: 6px;
      vertical-align: middle;
    }

    .dedup-ref {
      font-size: 0.78rem;
      color: #6b7280;
      margin-top: 2px;
      padding: 3px 0;
    }

    .dedup-ref strong {
      color: #4b5563;
    }
    .result-values {
      margin-top: 6px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .result-values pre {
      background: var(--color-bg-soft);
      padding: 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      overflow-x: auto;
      max-height: 220px;
    }

    .context-modal {
      position: fixed;
      inset: 0;
      background: rgba(18, 25, 38, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 2000;
    }

    .context-modal.open {
      display: flex;
    }

    .context-modal-card {
      width: min(1600px, 96vw);
      max-height: min(85vh, 920px);
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .context-modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-bg-card);
    }

    .context-modal-title {
      margin: 0;
      font-size: 1.05rem;
    }

    .context-modal-meta {
      margin-top: 4px;
      font-size: 0.85rem;
      color: var(--color-text-muted);
      word-break: break-word;
    }

    .context-close {
      border: 1px solid var(--color-border);
      background: #fff;
      color: #000;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .context-close:hover {
      background: #000;
      color: #fff;
      border-color: #000;
    }

    .context-modal-body {
      display: flex;
      flex-direction: column;
      padding: 16px 18px 18px;
      overflow: auto;
    }

    .context-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .context-tab {
      border: 1px solid var(--color-border);
      background: #fff;
      color: #000;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .context-tab.active {
      background: #000;
      color: #fff;
      border-color: #000;
    }

    .context-tab-panel {
      display: none;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .context-tab-panel.active {
      display: grid;
    }

    .context-pane {
      border: 1px solid var(--color-border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--color-bg-card);
      min-width: 0;
    }

    .context-pane-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-bg-soft);
    }

    .context-pane-header strong {
      display: block;
    }

    .context-pane-path {
      margin-top: 4px;
      font-size: 0.78rem;
      color: var(--color-text-muted);
      word-break: break-word;
    }

    .context-pane pre {
      margin: 0;
      padding: 14px;
      font-size: 0.82rem;
      overflow: auto;
      max-height: 56vh;
      background: #fff;
    }

    @media (max-width: 900px) {
      .results-layout {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .results-list {
        position: static;
        max-height: none;
      }
      .report-card {
        position: static;
        max-height: none;
      }
      .report-summary {
        grid-template-columns: 1fr;
      }
      .result-values {
        grid-template-columns: 1fr;
      }
      .report-card {
        min-height: auto;
        padding: 12px;
      }
      .report-details {
        overflow: visible;
        padding-right: 0;
      }
      .context-modal {
        padding: 12px;
      }
      .context-modal-body {
        overflow: auto;
      }
      .context-tab-panel {
        grid-template-columns: 1fr;
      }
      .raw-command-list {
        flex-direction: column;
        flex-wrap: nowrap;
        max-height: 220px;
      }
      .raw-command-btn {
        min-width: 0;
        width: 100%;
        flex-basis: auto;
      }
      .context-pane pre {
        max-height: none;
      }
      .result-item {
        overflow-wrap: anywhere;
      }
      .result-values pre {
        white-space: pre-wrap;
      }
    }

    .results-body {
      background:
        linear-gradient(180deg, rgba(232, 239, 248, 0.92) 0%, rgba(248, 250, 252, 0.95) 360px),
        #f7f9fc;
    }

    .results-shell,
    .results-page {
      max-width: none;
    }

    .results-page {
      margin: 0 auto;
      width: 100%;
      padding-bottom: 32px;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .results-page .page-header {
      align-items: center;
      margin-bottom: 18px;
      padding: 22px 24px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
    }

    .results-page .page-title {
      font-size: 1.55rem;
      letter-spacing: 0;
      color: var(--color-heading);
    }

    .results-page .page-subtitle {
      margin-top: 6px;
      max-width: 680px;
      color: var(--color-muted);
      line-height: 1.45;
    }

    .results-action-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
      padding: 14px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.06);
    }

    .results-action-bar .hint {
      margin: 0;
      color: #526173;
    }

    .results-layout {
      grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
      gap: 18px;
      margin-top: 0;
    }

    .results-list,
    .report-card {
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.07);
    }

    .results-list {
      top: 18px;
      max-height: calc(100vh - 120px);
    }

    .results-list-header {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.25);
      color: #173b78;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .results-list-body {
      padding: 10px;
      background: #f8fafc;
    }

    .student-result-item {
      margin-bottom: 8px;
      padding: 12px 13px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 8px;
      background: #ffffff;
      color: #172033;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
    }

    .student-result-item:last-child {
      margin-bottom: 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.28);
    }

    .student-result-item:hover {
      border-color: #cbd5e1;
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
    }

    .student-result-item.selected {
      border-color: #0a5cbb;
      background: linear-gradient(180deg, #ffffff 0%, #f3f8ff 100%);
      color: #0a4f9d;
      box-shadow: 0 8px 24px rgba(10, 92, 187, 0.14);
    }

    .status-pass,
    .status-fail,
    .status-missing {
      color: inherit !important;
    }

    .status-pass {
      background: #dcfce7 !important;
      border-color: #22c55e !important;
      color: #14532d !important;
    }

    .status-fail {
      background: #fee2e2 !important;
      border-color: #dc2626 !important;
      color: #7f1d1d !important;
    }

    .status-missing {
      background: #e2e8f0 !important;
      border-color: #64748b !important;
      color: #334155 !important;
    }

    .student-breakdown {
      color: inherit !important;
      opacity: 1;
    }

    .report-card {
      top: 18px;
      padding: 22px;
    }

    .report-card > h2,
    .report-card > p.hint {
      margin-top: 0;
    }

    .report-summary {
      gap: 12px;
      margin: 18px 0;
    }

    .summary-box {
      border-color: rgba(148, 163, 184, 0.28);
      border-radius: 8px;
      background: #f8fafc;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }

    .summary-box:hover {
      border-color: #0a5cbb;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(10, 92, 187, 0.12);
    }

    .summary-pass {
      background: #f0fdf4;
      color: #14532d;
    }

    .summary-fail {
      background: #fff1f2;
      color: #7f1d1d;
    }

    .report-details {
      padding-right: 6px;
    }

    .report-section {
      margin-top: 18px;
    }

    .report-section-header {
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.24);
    }

    .result-item {
      margin-bottom: 10px;
      padding: 12px;
      border-color: rgba(148, 163, 184, 0.3);
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
    }

    .result-item:hover {
      border-color: #cbd5e1;
    }

    .result-values pre {
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: #f8fafc;
    }

    .raw-preview-btn {
      border-color: rgba(148, 163, 184, 0.34);
      background: #ffffff;
      color: #526173;
    }

    .raw-preview-btn:hover {
      background: #0a5cbb !important;
      border-color: #0a5cbb !important;
      color: #ffffff !important;
    }

    .context-modal-card {
      border-radius: 8px;
      box-shadow: 0 24px 58px rgba(15, 23, 42, 0.24);
    }

    .context-modal-header {
      background: #ffffff;
      border-bottom-color: rgba(148, 163, 184, 0.24);
    }

    .context-close,
    .context-tab {
      border-color: rgba(148, 163, 184, 0.34);
      color: #526173;
    }

    .context-close:hover,
    .context-tab.active {
      background: #0a5cbb;
      border-color: #0a5cbb;
      color: #ffffff;
    }

    @media (max-width: 900px) {
      .results-layout {
        grid-template-columns: 1fr;
      }

      .results-list,
      .report-card {
        position: static;
        max-height: none;
      }
    }
  </style>
</head>
<body class="results-body">
  <div id="navbarContainer"></div>

  <div class="page-shell results-shell">
    <section class="page-card results-page">
      <header class="page-header page-header--with-action">
        <div>
          <h1 class="page-title">Comparison Results</h1>
          <p class="page-subtitle">Run the comparison engine and review pass/fail status per student.</p>
        </div>
        <a class="tutorial-page-link" href="quick_guide.html#resultsGuidePanel">Tutorial</a>
      </header>

      <div class="actions align-left results-action-bar">
        <button type="button" id="runComparisonBtn" class="primary">Run Comparison</button>
        <span id="sessionLabel" class="hint"></span>
      </div>

      <div class="results-layout">
        <aside class="results-list">
          <div class="results-list-header">Students</div>
          <div class="results-list-body" id="resultsList"></div>
        </aside>

        <section class="report-card" id="reportPanel">
          <p class="hint">Select a student to view the full report.</p>
        </section>
      </div>
    </section>
  </div>

  <div id="errorContextModal" class="context-modal" aria-hidden="true">
    <div class="context-modal-card">
      <div class="context-modal-header">
        <div>
          <h3 id="errorContextTitle" class="context-modal-title">Config Context</h3>
          <div id="errorContextMeta" class="context-modal-meta"></div>
        </div>
        <button type="button" id="closeErrorContextBtn" class="context-close">Close</button>
      </div>
      <div id="errorContextBody" class="context-modal-body"></div>
    </div>
  </div>

  <script src="renderer.js"></script>
  <script src="results.js"></script>
</body>
</html>
