<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Comparison Results</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/nav.css" />
  <style>
    .results-layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 20px;
      margin-top: 20px;
      align-items: start;
    }

    .results-list {
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-bg-card);
      overflow: hidden;
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
    }

    .results-list-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--color-border);
      font-weight: 600;
    }

    .results-list-body {
      overflow-y: auto;
    }

    .student-result-item {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .student-result-item:last-child {
      border-bottom: none;
    }

    .student-result-item.selected {
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.9), 0 10px 24px rgba(0, 0, 0, 0.12);
      transform: translateY(-1px);
    }

    .status-pass {
      background: linear-gradient(135deg, #dff6e6 0%, #ccefd7 100%);
      color: #13361f;
    }

    .status-fail {
      background: linear-gradient(135deg, #fde2e2 0%, #f6c9c9 100%);
      color: #5b1f1f;
    }

    .status-missing {
      background: linear-gradient(135deg, #eef1f5 0%, #e0e6ee 100%);
      color: var(--color-text-muted);
    }

    .student-result-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
    }

    .student-score {
      font-size: 1rem;
      font-weight: 700;
    }

    .student-breakdown {
      font-size: 0.82rem;
      opacity: 0.85;
    }

    .report-card {
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 16px;
      background: var(--color-bg-card);
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .report-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-box {
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 10px 12px;
      background: var(--color-bg-soft);
    }

    .summary-score {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .summary-score div {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .summary-score small {
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      font-weight: 700;
      text-transform: uppercase;
    }

    .summary-pass {
      background: linear-gradient(135deg, #dff6e6 0%, #ccefd7 100%);
      color: #13361f;
    }

    .summary-fail {
      background: linear-gradient(135deg, #fde2e2 0%, #f6c9c9 100%);
      color: #5b1f1f;
    }

    .report-section {
      margin-top: 16px;
    }

    .report-details {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding-right: 4px;
    }

    .result-item {
      padding: 8px 10px;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      margin-bottom: 8px;
      background: #fff;
    }

    .result-item .meta {
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }

    .result-item .result-code {
      font-size: 0.8rem;
      color: var(--color-muted);
      margin-bottom: 4px;
    }

    .result-item .status {
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
    }

    .severity-major {
      color: var(--color-danger);
    }

    .severity-minor {
      color: #ff9800;
    }

    .result-values {
      margin-top: 6px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .result-values pre {
      background: var(--color-bg-soft);
      padding: 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      overflow-x: auto;
      max-height: 220px;
    }

    @media (max-width: 900px) {
      .results-layout {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .results-list {
        position: static;
        max-height: none;
      }
      .report-card {
        position: static;
        max-height: none;
      }
      .report-summary {
        grid-template-columns: 1fr;
      }
      .result-values {
        grid-template-columns: 1fr;
      }
      .report-card {
        min-height: auto;
        padding: 12px;
      }
      .report-details {
        overflow: visible;
        padding-right: 0;
      }
      .result-item {
        overflow-wrap: anywhere;
      }
      .result-values pre {
        white-space: pre-wrap;
      }
    }
  </style>
</head>
<body class="directory-body">
  <div id="navbarContainer"></div>

  <div class="page-shell">
    <section class="page-card">
      <header class="page-header">
        <h1 class="page-title">Comparison Results</h1>
        <p class="page-subtitle">Run the comparison engine and review pass/fail status per student.</p>
      </header>

      <div class="actions align-left" style="gap: 10px; margin-bottom: 12px;">
        <button type="button" id="runComparisonBtn" class="primary">Run Comparison</button>
        <button type="button" id="refreshResultsBtn" class="secondary">Refresh Results</button>
        <span id="sessionLabel" class="hint"></span>
      </div>

      <div class="results-layout">
        <aside class="results-list">
          <div class="results-list-header">Students</div>
          <div class="results-list-body" id="resultsList"></div>
        </aside>

        <section class="report-card" id="reportPanel">
          <p class="hint">Select a student to view the full report.</p>
        </section>
      </div>
    </section>
  </div>

  <script src="renderer.js"></script>
  <script src="results.js"></script>
</body>
</html>
