<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Comparison Results</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/nav.css" />
  <style>
    .results-layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 20px;
      margin-top: 20px;
    }

    .results-list {
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-bg-card);
      overflow: hidden;
      max-height: 520px;
      display: flex;
      flex-direction: column;
    }

    .results-list-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--color-border);
      font-weight: 600;
    }

    .results-list-body {
      overflow-y: auto;
    }

    .student-result-item {
      padding: 10px 14px;
      border-bottom: 1px solid var(--color-border);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .student-result-item:last-child {
      border-bottom: none;
    }

    .student-result-item.selected {
      background: var(--color-primary);
      color: #fff;
    }

    .status-pass {
      border-left: 4px solid var(--color-success, #28a745);
    }

    .status-fail {
      border-left: 4px solid var(--color-danger, #c53e3e);
    }

    .status-missing {
      border-left: 4px solid #9aa4b2;
      color: var(--color-text-muted);
    }

    .report-card {
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 16px;
      background: var(--color-bg-card);
      min-height: 520px;
    }

    .report-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-box {
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 10px 12px;
      background: var(--color-bg-soft);
    }

    .report-section {
      margin-top: 16px;
    }

    .result-item {
      padding: 8px 10px;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      margin-bottom: 8px;
      background: #fff;
    }

    .result-item .meta {
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }

    .result-item .status {
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
    }

    .severity-major {
      color: var(--color-danger);
    }

    .severity-minor {
      color: #ff9800;
    }

    .result-values {
      margin-top: 6px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .result-values pre {
      background: var(--color-bg-soft);
      padding: 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      overflow-x: auto;
      max-height: 220px;
    }

    @media (max-width: 900px) {
      .results-layout {
        grid-template-columns: 1fr;
      }
      .results-list {
        max-height: 260px;
      }
      .report-summary {
        grid-template-columns: 1fr;
      }
      .result-values {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="directory-body">
  <div id="navbarContainer"></div>

  <div class="page-shell">
    <section class="page-card">
      <header class="page-header">
        <h1 class="page-title">Comparison Results</h1>
        <p class="page-subtitle">Run the comparison engine and review pass/fail status per student.</p>
      </header>

      <div class="actions align-left" style="gap: 10px; margin-bottom: 12px;">
        <button type="button" id="runComparisonBtn" class="primary">Run Comparison</button>
        <button type="button" id="refreshResultsBtn" class="secondary">Refresh Results</button>
        <span id="sessionLabel" class="hint"></span>
      </div>

      <div class="results-layout">
        <aside class="results-list">
          <div class="results-list-header">Students</div>
          <div class="results-list-body" id="resultsList"></div>
        </aside>

        <section class="report-card" id="reportPanel">
          <p class="hint">Select a student to view the full report.</p>
        </section>
      </div>
    </section>
  </div>

  <script src="renderer.js"></script>
  <script src="results.js"></script>
</body>
</html>
